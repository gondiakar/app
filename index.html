<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gondiakar News</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f5f5;
color:#222;
}

header{
background:#7F4AA6);
padding:15px 5%;
position:sticky;
top:0;
z-index:1000;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
width:60px;
height:60px;
border-radius:50%;
background:#fff;
}

.logo h2{
color:#fff;
}

.hero{
background:linear-gradient(135deg,#d32f2f,#7f0000);
padding:100px 20px;
text-align:center;
color:white;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
max-width:700px;
margin:auto;
font-size:18px;
}

.btns{
margin-top:30px;
}

.btn{
display:inline-block;
padding:15px 30px;
margin:10px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

.apk{
background:#ffd600;
color:#000;
}

.play{
background:#fff;
color:#c62828;
}

.section{
padding:80px 5%;
}

.title{
text-align:center;
font-size:40px;
color:#c62828;
margin-bottom:40px;
}

.features{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h3{
margin-bottom:10px;
color:#c62828;
}

.news{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.news-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.news-card img{
width:100%;
height:220px;
object-fit:cover;
}

.news-content{
padding:20px;
}

.screenshots{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.screenshots img{
width:100%;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

.download{
background:#c62828;
color:white;
text-align:center;
padding:80px 20px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:30px;
}

@media(max-width:768px){

.hero h1{
font-size:35px;
}

.title{
font-size:28px;
}
}
</style>
</head>
<body>

<header>
<div class="navbar">

<div class="logo">
<img src="logo.jpg.jpg" alt="Gondiakar">
<div>
<h2>GONDIAKAR NEWS</h2>
</div>
</div>

</div>
</header>

<section class="hero">
<h1>Gondia's Most Trusted Local News Platform</h1>

<p>
Breaking News • Crime Updates • Government News • Jobs • Education • Events • Local Stories
</p>

<div class="btns">
<a href="#" class="btn apk">Download APK</a>
<a href="#" class="btn play">Play Store</a>
</div>
</section>

</body>
</html>
